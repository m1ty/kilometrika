# Kilometrika -> Home Assistant: MQTT-сенсоры.
# Подключение: в configuration.yaml добавь
#   mqtt: !include kilometrika_sensors.yaml   # (или вложи секцию sensor в существующий блок mqtt)
# Источник данных: retained-топик tcx_analyzer/state, публикуется при импорте и раз в час.

sensor:
  # ── Бег ──────────────────────────────────────────────
  - name: "Бег за неделю"
    unique_id: kilometrika_run_week
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.run.week_km }}"
    unit_of_measurement: "km"
    icon: mdi:run
    state_class: measurement
    device: &kilometrika_device
      identifiers: [kilometrika]
      name: Kilometrika
      model: Self-hosted training log
      configuration_url: "http://192.168.1.7:8000"

  - name: "Бег за месяц"
    unique_id: kilometrika_run_month
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.run.month_km }}"
    unit_of_measurement: "km"
    icon: mdi:run
    state_class: measurement
    device: *kilometrika_device

  - name: "Бег за год"
    unique_id: kilometrika_run_year
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.run.year_km }}"
    unit_of_measurement: "km"
    icon: mdi:run
    state_class: measurement
    device: *kilometrika_device

  - name: "Последняя пробежка"
    unique_id: kilometrika_run_last
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.run.last_km }}"
    unit_of_measurement: "km"
    icon: mdi:shoe-sneaker
    device: *kilometrika_device

  - name: "Последняя пробежка дата"
    unique_id: kilometrika_run_last_date
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.run.last_date | default('—') }}"
    icon: mdi:calendar
    device: *kilometrika_device

  # ── Велосипед ────────────────────────────────────────
  - name: "Вело за неделю"
    unique_id: kilometrika_bike_week
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.bike.week_km }}"
    unit_of_measurement: "km"
    icon: mdi:bike
    state_class: measurement
    device: *kilometrika_device

  - name: "Вело за месяц"
    unique_id: kilometrika_bike_month
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.bike.month_km }}"
    unit_of_measurement: "km"
    icon: mdi:bike
    state_class: measurement
    device: *kilometrika_device

  - name: "Вело за год"
    unique_id: kilometrika_bike_year
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.bike.year_km }}"
    unit_of_measurement: "km"
    icon: mdi:bike
    state_class: measurement
    device: *kilometrika_device

  - name: "Последний заезд"
    unique_id: kilometrika_bike_last
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.bike.last_km }}"
    unit_of_measurement: "km"
    icon: mdi:bike-fast
    device: *kilometrika_device

  - name: "Последний заезд дата"
    unique_id: kilometrika_bike_last_date
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.bike.last_date | default('—') }}"
    icon: mdi:calendar
    device: *kilometrika_device

  # ── Общее ────────────────────────────────────────────
  - name: "Всего тренировок"
    unique_id: kilometrika_total
    state_topic: "tcx_analyzer/state"
    value_template: "{{ value_json.total_activities }}"
    icon: mdi:counter
    state_class: total_increasing
    device: *kilometrika_device
